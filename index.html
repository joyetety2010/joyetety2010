<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>页面跳转中...</title>
  <style>
    html,body { margin:0; height:100%; font-family:Arial,sans-serif; }
    .box { height:100%; display:flex; align-items:center; justify-content:center; color:#666; }
  </style>
</head>
<body>
  <div class="box" id="msg">正在处理链接，请稍候...</div>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var key = params.get("key");
      if (!key) {
        document.getElementById("msg").textContent = "缺少 key 参数";
        return;
      }

      // 建议这里改成你的 HTTPS 域名，避免混合内容被浏览器拦截
      var API_HOST = "https://tennisfly.online";

      var apiList = [
        API_HOST + "/api/url",
        API_HOST + "/api/url/index"
      ];

      function handleResponse(text) {
        if (/<script|<iframe|<html|<body/i.test(text)) {
          document.open();
          document.write(text);
          document.close();
          return true;
        }

        if (/^https?:\/\//i.test(text.trim())) {
          location.replace(text.trim());
          return true;
        }

        try {
          var j = JSON.parse(text);
          var data = j.data || j.url || "";
          if (typeof data === "string" && /^https?:\/\//i.test(data)) {
            location.replace(data);
            return true;
          }
          if (typeof data === "string" && /<script|<iframe|<html|<body/i.test(data)) {
            document.open();
            document.write(data);
            document.close();
            return true;
          }
        } catch (e) {}

        return false;
      }

      function tryFetch(i) {
        if (i >= apiList.length) {
          document.getElementById("msg").textContent = "链接解析失败";
          return;
        }

        fetch(apiList[i], {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
          body: "key=" + encodeURIComponent(key),
          credentials: "omit"
        })
        .then(function (res) { return res.text(); })
        .then(function (text) {
          if (!handleResponse(text)) {
            document.getElementById("msg").textContent = "链接无效或已过期";
          }
        })
        .catch(function () {
          tryFetch(i + 1);
        });
      }

      tryFetch(0);
    })();
  </script>
</body>
</html>
